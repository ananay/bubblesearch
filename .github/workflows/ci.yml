name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & test
    runs-on: macos-15
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Test release notes generator
        run: |
          NOTES_DIR=$(mktemp -d)
          python3 scripts/generate-release-notes.py \
            --version 0.0.0 \
            --commit "$GITHUB_SHA" \
            --output-dir "$NOTES_DIR"

          SUBJECT=$(git show -s --format=%s "$GITHUB_SHA")
          grep -F "$SUBJECT" "$NOTES_DIR/BubbleSearch-0.0.0.html"

          printf '%s\n' 'Custom <headline>' > "$NOTES_DIR/custom.txt"
          printf '%s\n' 'More & detail' > "$NOTES_DIR/additional.txt"
          python3 scripts/generate-release-notes.py \
            --version 0.0.1 \
            --notes-file "$NOTES_DIR/custom.txt" \
            --append-file "$NOTES_DIR/additional.txt" \
            --output-dir "$NOTES_DIR"

          grep -F 'Custom &lt;headline&gt;' "$NOTES_DIR/BubbleSearch-0.0.1.html"
          grep -F 'More &amp; detail' "$NOTES_DIR/BubbleSearch-0.0.1.html"

  supported-macos:
    name: macOS 14 (${{ matrix.architecture }})
    runs-on: macos-15
    strategy:
      matrix:
        architecture: [arm64, x86_64]
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4

      - name: Build for macOS 14
        run: |
          TARGET_TRIPLE="${{ matrix.architecture }}-apple-macosx14.0"
          swift build -c release --triple "$TARGET_TRIPLE"
          BINARY_DIRECTORY=$(swift build -c release --triple "$TARGET_TRIPLE" --show-bin-path)
          MINIMUM_SYSTEM_VERSION=$(vtool -show-build "$BINARY_DIRECTORY/bubblesearch" | awk '/minos/{print $2; exit}')
          if [[ "$MINIMUM_SYSTEM_VERSION" != "14.0" ]]; then
            echo "::error::$TARGET_TRIPLE binary targets macOS $MINIMUM_SYSTEM_VERSION instead of 14.0"
            exit 1
          fi

  release-artifact:
    name: Release artifact checks
    runs-on: macos-15
    defaults:
      run:
        working-directory: native
    steps:
      - uses: actions/checkout@v4

      # Bundle.module in an SPM *executable* target compiles to a lookup with
      # a fatalError fallback to an absolute .build path on the packaging
      # machine — it works on the dev Mac and crashes at launch everywhere
      # else (shipped as 1.0.2/1.0.3, fixed in 1.0.4). Never reference it.
      - name: Ban Bundle.module in executable target
        run: |
          if grep -rn "Bundle\.module" Sources | grep -vE '^[^:]+:[0-9]+: *//'; then
            echo "::error::Bundle.module is a launch crash in a distributed .app; resolve the resource bundle via Bundle.main instead (see UI/Helpers.swift)"
            exit 1
          fi

      - name: Build release binary
        run: swift build -c release

      # A path from the build machine baked into the binary means some code
      # path only works where it was compiled. On this runner any such path
      # would be /Users/runner/..., so grep for /Users/ generally. The
      # "could not load resource bundle" literal is SPM's generated
      # Bundle.module fatalError message — if it got linked in, the crashing
      # accessor is back.
      - name: No machine-specific paths in release binary
        run: |
          BIN=.build/release/bubblesearch
          if strings "$BIN" | grep -E "^/Users/" ; then
            echo "::error::build-machine paths are baked into the release binary"
            exit 1
          fi
          if strings "$BIN" | grep -q "could not load resource bundle"; then
            echo "::error::SPM's generated Bundle.module accessor is linked into the binary"
            exit 1
          fi

      # The runner has no Developer ID cert, so make-app.sh ad-hoc signs —
      # which is exactly what we want: this machine is "someone else's Mac".
      # The 1.0.2/1.0.3 crash fired inside OnboardingView during the first
      # window's creation, so surviving launch for a few seconds catches
      # this bug and any future crash-at-launch regression in the packaged
      # app (missing resources, bad rpath, unembedded framework, ...).
      - name: Launch smoke test of packaged app
        run: |
          ./make-app.sh

          EXPECTED_VERSION=$(scripts/read-version.sh)
          SHORT_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' build/BubbleSearch.app/Contents/Info.plist)
          BUNDLE_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' build/BubbleSearch.app/Contents/Info.plist)
          MINIMUM_SYSTEM_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :LSMinimumSystemVersion' build/BubbleSearch.app/Contents/Info.plist)
          BINARY_MINIMUM_SYSTEM_VERSION=$(vtool -show-build build/BubbleSearch.app/Contents/MacOS/BubbleSearch | awk '/minos/{print $2; exit}')
          SPARKLE_MINIMUM_SYSTEM_VERSION=$(vtool -show-build build/BubbleSearch.app/Contents/Frameworks/Sparkle.framework/Versions/B/Sparkle | awk '/minos/{print $2; exit}')

          if [[ "$SHORT_VERSION" != "$EXPECTED_VERSION" || "$BUNDLE_VERSION" != "$EXPECTED_VERSION" ]]; then
            echo "::error::packaged versions ($SHORT_VERSION/$BUNDLE_VERSION) do not match native/VERSION ($EXPECTED_VERSION)"
            exit 1
          fi
          if [[ "$MINIMUM_SYSTEM_VERSION" != "14.0" ]]; then
            echo "::error::packaged minimum macOS version changed from 14.0 to $MINIMUM_SYSTEM_VERSION"
            exit 1
          fi
          if [[ "$BINARY_MINIMUM_SYSTEM_VERSION" != "14.0" ]]; then
            echo "::error::binary minimum macOS version changed from 14.0 to $BINARY_MINIMUM_SYSTEM_VERSION"
            exit 1
          fi
          if ! awk -v version="$SPARKLE_MINIMUM_SYSTEM_VERSION" 'BEGIN { exit !(version + 0 <= 14.0) }'; then
            echo "::error::Sparkle requires macOS $SPARKLE_MINIMUM_SYSTEM_VERSION, newer than BubbleSearch's 14.0 minimum"
            exit 1
          fi

          build/BubbleSearch.app/Contents/MacOS/BubbleSearch &
          APP_PID=$!
          sleep 5
          if ! kill -0 "$APP_PID" 2>/dev/null; then
            wait "$APP_PID" || STATUS=$?
            echo "::error::packaged app died within 5s of launch (exit status ${STATUS:-unknown})"
            exit 1
          fi
          echo "app alive 5s after launch"
          kill "$APP_PID"
